services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    env_file: .env
    environment:
      - DB_PATH=/app/data/db.sqlite
      - CHROMA_PATH=/app/data/chroma
      - ARTIFACTS_PATH=/app/data/artifacts

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
