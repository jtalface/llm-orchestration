<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LLM Orchestration Platform</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      :root {
        --bg: #0f0f11;
        --surface: #18181b;
        --surface2: #212124;
        --border: #2e2e33;
        --text: #e4e4e7;
        --text-dim: #71717a;
        --accent: #6366f1;
        --accent-hover: #818cf8;
        --green: #4ade80;
        --yellow: #facc15;
        --red: #f87171;
        --tool-bg: #1a1a2e;
        --tool-border: #312e81;
      }
      body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; height: 100vh; overflow: hidden; }
      #root { height: 100vh; display: flex; }
      pre { font-family: 'JetBrains Mono', 'Fira Code', monospace; }
      code { font-family: 'JetBrains Mono', 'Fira Code', monospace; }
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
